# Spring Boot 配置
spring:
  application:
    name: meituan-product-upload

  # Tomcat 配置（增加超时时间）
  server:
    tomcat:
      connection-timeout: 600000  # 10分钟超时
      max-swallow-time: -1        # 取消最大吞咽时间限制
  
  # 数据源配置（远程服务器）
  datasource:
    url: jdbc:mysql://106.55.102.48:3306/meituan_product?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: mysql_G4EcQ6
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      socket-timeout: 120000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Jackson 时区配置
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      enabled: true

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.meituan.product.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 美团 API 配置
meituan:
  api:
    base-url: https://api.meituan.com
    timeout: 30000
  upload:
    batch-size: 200
  export:
    max-rows-per-file: 2000  # 每个Excel文件最大导出行数
  # 自适应映射配置
  adaptive-mapping:
    enabled: true
    config-file: classpath:mapping-rules.json
    confidence-threshold: 0.8

# MinIO 配置（远程服务器）
minio:
  endpoint: http://106.55.102.48
  port: 9000
  access-key: minio_cf4STY
  secret-key: minio_ZGBzK7
  bucket-name: meituan-products

# 文件存储配置
file:
  upload:
    template-path: ./uploads/templates/
    retention-days: 30

# 日志配置
logging:
  level:
    com.meituan.product: INFO
    org.springframework: INFO
